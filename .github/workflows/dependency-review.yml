name: Dependency review

on:
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/dependency-review.yml"

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
